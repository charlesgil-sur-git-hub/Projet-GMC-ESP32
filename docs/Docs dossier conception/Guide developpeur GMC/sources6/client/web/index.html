<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Récolteur de Données GMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h2>Archives ESP32 S3</h2>

            </select>

        <p id="status"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
